<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Links | NOEASY</title>
<link rel="icon" type="image/png" href="/IMG_8091.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fondamento:ital@0;1&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --bg: #f6f1da; --text: #353535; }

  html, body {
    width: 100%; min-height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    overscroll-behavior: none;
    -webkit-tap-highlight-color: transparent;
    overflow-x: hidden;
    transition: background-color 2.5s ease;
  }

  /* ── Grain ── */
  #grain {
    position: fixed;
    top: -60px; bottom: -60px; left: -10px; right: -10px;
    z-index: 10; pointer-events: none;
  }

  /* ── Custom cursor ── */
  #cursor {
    position: fixed; z-index: 9999; pointer-events: none;
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid rgba(53,53,53,0.35);
    transform: translate(-50%, -50%) scale(0);
    transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s;
    opacity: 0; mix-blend-mode: multiply;
  }
  #cursor.active  { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  #cursor.pressed { transform: translate(-50%, -50%) scale(0.6); }

  /* ── Scroll progress ── */
  #scroll-progress {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: 2px; z-index: 400; pointer-events: none;
  }
  #scroll-progress::after {
    content: '';
    position: absolute; left: 0; top: 0; width: 100%;
    height: var(--progress, 0%);
    background: var(--text); opacity: 0.15;
    transition: height 0.1s linear;
  }

  /* ── Header pill ── */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 500;
    padding: calc(14px + env(safe-area-inset-top, 0px)) 16px 0;
    display: flex; align-items: flex-start; justify-content: center;
    pointer-events: none;
    opacity: 0; transform: translateY(0);
    transition: opacity 0.7s ease, transform 0.52s cubic-bezier(0.16,1,0.3,1);
  }
  header.visible { opacity: 1; }
  header > * { pointer-events: auto; }

  .header-pill {
    display: flex; align-items: center;
    position: relative;
    width: 100%; max-width: min(820px, 92vw);
    height: 44px; border-radius: 22px;
    -webkit-backdrop-filter: blur(24px) saturate(1.3);
    backdrop-filter: blur(24px) saturate(1.3);
    background: rgba(246,241,218,0.74);
    box-shadow: 0 1px 0 rgba(53,53,53,0.07), 0 6px 28px rgba(53,53,53,0.06);
    overflow: visible;
  }

  .pill-divider {
    width: 1px; height: 20px; flex-shrink: 0;
    background: rgba(53,53,53,0.1); align-self: center;
  }

  .pill-title {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-family: 'Fondamento', serif; font-size: 14px; font-weight: 400;
    letter-spacing: 0.08em;
    opacity: 0.7; pointer-events: none; user-select: none;
    white-space: nowrap;
  }

  .pill-btn {
    height: 100%; display: flex; align-items: center;
    padding: 0 18px; gap: 7px;
    font-family: 'Space Mono', monospace;
    font-size: 10px; font-weight: 300;
    letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--text); background: none; border: none;
    cursor: pointer; opacity: 0.42; user-select: none;
    transition: opacity 0.22s, background 0.18s, transform 0.12s cubic-bezier(0.34,1.56,0.64,1);
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap; flex-shrink: 0; text-decoration: none;
  }
  .pill-btn:hover  { opacity: 0.76; }
  .pill-btn:active { transform: scale(0.93); }

  .sword-btn {
    height: 100%; padding: 0 18px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 5.5px; background: none; border: none; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1); flex-shrink: 0;
  }
  .sword-btn:active { transform: scale(0.88); }
  .sword-btn .line {
    position: relative; height: 1.5px; background: var(--text);
    border-radius: 2px; opacity: 0.5;
    transition: transform 0.38s cubic-bezier(0.16,1,0.3,1), opacity 0.25s, width 0.38s cubic-bezier(0.16,1,0.3,1);
  }
  .sword-btn .line:nth-child(1) { width: 20px; }
  .sword-btn .line:nth-child(2) { width: 14px; }
  .sword-btn .line:nth-child(3) { width: 17px; }
  .sword-btn .line::after {
    content: ''; position: absolute; right: 3px; top: 50%;
    transform: translateY(-50%); width: 1.5px; height: 6px;
    background: var(--text); border-radius: 1px; opacity: 0.5; transition: opacity 0.25s;
  }
  .sword-btn.open .line { opacity: 0.75; }
  .sword-btn.open .line:nth-child(1) { width: 18px; transform: translateY(7px) rotate(45deg); }
  .sword-btn.open .line:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .sword-btn.open .line:nth-child(3) { width: 18px; transform: translateY(-7px) rotate(-45deg); }

  .burger-wrap { position: relative; height: 100%; display: flex; align-items: center; }

  .nav-overlay {
    position: absolute; top: calc(100% + 10px); right: 0; z-index: 8999;
    min-width: 160px; border-radius: 18px; padding: 6px 8px 8px;
    background: rgba(246,241,218,0.95);
    -webkit-backdrop-filter: blur(22px) saturate(1.3);
    backdrop-filter: blur(22px) saturate(1.3);
    box-shadow: 0 2px 0 rgba(53,53,53,0.05), 0 12px 40px rgba(53,53,53,0.12);
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none;
    transform: translateY(-6px) scale(0.97); transform-origin: top right;
    transition: opacity 0.28s cubic-bezier(0.16,1,0.3,1), transform 0.28s cubic-bezier(0.16,1,0.3,1);
  }
  .nav-overlay.open { opacity: 1; pointer-events: auto; transform: translateY(0) scale(1); }
  .nav-overlay a {
    font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 300;
    letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--text); text-decoration: none; padding: 10px 12px;
    opacity: 0.38; position: relative; transition: opacity 0.22s, background 0.18s; border-radius: 12px;
  }
  .nav-overlay a::after {
    content: ''; position: absolute; bottom: 6px; left: 12px;
    width: 0; height: 1px; background: var(--text); opacity: 0.45;
    transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .nav-overlay a:hover { opacity: 0.75; background: rgba(53,53,53,0.04); }
  .nav-overlay a:hover::after { width: calc(100% - 24px); }
  .nav-overlay a.current { opacity: 0.88; font-weight: 500; }
  .nav-overlay a.current::after { width: calc(100% - 24px); }
  .nav-overlay a + a { border-top: 1px solid rgba(53,53,53,0.06); border-radius: 0 0 12px 12px; }
  .nav-overlay a:first-child { border-radius: 12px 12px 0 0; }

  /* ── Page ── */
  main {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: calc(110px + env(safe-area-inset-top, 0px)) 24px 120px;
  }

  .content-wrap { width: 100%; max-width: min(560px, 92vw); }

  /* ── Section ── */
  .section {
    margin-bottom: 8px;
    opacity: 0; transform: translateY(16px);
    transition: opacity 0.65s cubic-bezier(0.16,1,0.3,1),
                transform 0.65s cubic-bezier(0.16,1,0.3,1);
  }
  .section.visible { opacity: 1; transform: none; }

  .group-header {
    display: flex; align-items: baseline; justify-content: space-between;
    padding-bottom: 10px;
    border-bottom: 1px solid rgba(53,53,53,0.08);
    margin-bottom: 2px;
  }
  .group-label {
    font-family: 'Fondamento', serif;
    font-size: 20px; font-weight: 400;
    letter-spacing: 0.02em; opacity: 0.7;
  }
  .group-index {
    font-size: 8px; font-weight: 300;
    letter-spacing: 0.3em; opacity: 0.18; user-select: none;
  }

  /* ── Link row ── */
  .link-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 0; border-bottom: 1px solid rgba(53,53,53,0.05);
    position: relative;
  }
  .link-row:last-child { border-bottom: none; }

  a.link-item {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none; color: var(--text);
    cursor: pointer; flex: 1; min-width: 0;
  }

  .link-name {
    font-size: 10px; font-weight: 300;
    letter-spacing: 0.28em; text-transform: uppercase;
    opacity: 0.52; position: relative;
    transition: opacity 0.25s;
    white-space: nowrap;
  }
  .link-name::after {
    content: ''; position: absolute; bottom: -2px; left: 0;
    width: 0; height: 1px; background: var(--text); opacity: 0.38;
    transition: width 0.42s cubic-bezier(0.4,0,0.2,1);
  }
  a.link-item:hover .link-name { opacity: 0.88; }
  a.link-item:hover .link-name::after { width: 100%; }

  .link-arrow {
    font-size: 11px; opacity: 0; transform: translateX(-5px);
    transition: opacity 0.25s, transform 0.35s cubic-bezier(0.16,1,0.3,1);
    flex-shrink: 0;
  }
  a.link-item:hover .link-arrow { opacity: 0.28; transform: translateX(0); }

  /* Ghost domain — whisper on the right */
  .link-domain {
    font-size: 8px; font-weight: 300; letter-spacing: 0.16em;
    opacity: 0; transform: translateX(8px);
    transition: opacity 0.38s ease, transform 0.38s cubic-bezier(0.16,1,0.3,1);
    white-space: nowrap; flex-shrink: 0; pointer-events: none; color: var(--text);
  }
  .link-row:hover .link-domain { opacity: 0.16; transform: translateX(0); }

  /* ── Social pills ── */
  .social-row { display: flex; gap: 8px; flex-wrap: wrap; padding: 12px 0 6px; }

  a.social-pill {
    display: inline-flex; align-items: center; gap: 7px;
    height: 32px; padding: 0 14px; border-radius: 16px;
    background: rgba(53,53,53,0.05);
    color: var(--text); text-decoration: none;
    font-size: 8px; font-weight: 300;
    letter-spacing: 0.22em; text-transform: uppercase;
    opacity: 0.46;
    transition: opacity 0.25s, background 0.25s,
                transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    -webkit-tap-highlight-color: transparent; white-space: nowrap;
  }
  a.social-pill svg { width: 13px; height: 13px; display: block; flex-shrink: 0; }
  a.social-pill:hover { opacity: 0.88; background: rgba(53,53,53,0.08); transform: translateY(-2px); }
  a.social-pill:active { transform: scale(0.94); }

  /* ── Divider ── */
  .section-divider {
    width: 100%; height: 1px; background: rgba(53,53,53,0.08);
    margin: 44px 0; opacity: 0;
    transition: opacity 0.7s ease;
  }
  .section-divider.visible { opacity: 1; }

  /* ── Form ── */
  .form-section {
    opacity: 0; transform: translateY(16px);
    transition: opacity 0.65s cubic-bezier(0.16,1,0.3,1),
                transform 0.65s cubic-bezier(0.16,1,0.3,1);
  }
  .form-section.visible { opacity: 1; transform: none; }

  .form-label-top {
    font-family: 'Fondamento', serif; font-size: 20px;
    opacity: 0.28; display: block; margin-bottom: 28px;
  }

  .form-field { width: 100%; margin-bottom: 20px; }
  .form-field input, .form-field textarea {
    width: 100%; background: transparent; border: none;
    border-bottom: 1px solid rgba(53,53,53,0.13);
    padding: 10px 0; font-family: 'Space Mono', monospace;
    font-size: 11px; font-weight: 300; letter-spacing: 0.14em;
    color: var(--text); outline: none; resize: none; display: block;
    border-radius: 0; -webkit-appearance: none; appearance: none;
    transition: border-color 0.3s;
  }
  .form-field input::placeholder, .form-field textarea::placeholder {
    color: var(--text); opacity: 0.22;
    letter-spacing: 0.18em; text-transform: uppercase; font-size: 9px;
  }
  .form-field input:focus, .form-field textarea:focus { border-color: rgba(53,53,53,0.38); }
  .form-field textarea { min-height: 90px; }

  button.form-submit {
    margin-top: 10px; background: none; border: none;
    font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 300;
    letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--text); opacity: 0.38; cursor: pointer;
    padding: 8px 0; display: flex; align-items: center; gap: 10px;
    transition: opacity 0.25s; -webkit-appearance: none; appearance: none;
  }
  button.form-submit:hover { opacity: 0.85; }
  .submit-arrow { display: inline-block; transition: transform 0.35s cubic-bezier(0.16,1,0.3,1); }
  button.form-submit:hover .submit-arrow { transform: translateX(5px); }

  .form-status {
    font-size: 9px; font-weight: 300; letter-spacing: 0.22em; text-transform: uppercase;
    opacity: 0; margin-top: 14px; transition: opacity 0.4s;
  }
  .form-status.show { opacity: 0.4; }

  @media (max-width: 600px) {
    main { padding: 96px 20px 100px; }
  }
</style>
</head>
<body>

<canvas id="grain"></canvas>
<div id="cursor"></div>
<div id="scroll-progress"></div>

<header id="siteHeader">
  <div class="header-pill">
    <span class="pill-title">Links</span>
    <div style="flex:1"></div>
    <div class="pill-divider"></div>
    <div class="burger-wrap">
      <button class="sword-btn" id="swordBtn" aria-label="Menu">
        <span class="line"></span>
        <span class="line"></span>
        <span class="line"></span>
      </button>
      <div class="nav-overlay" id="navOverlay">
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/gallery">Gallery</a>
        <a href="/links" class="current">Links</a>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="content-wrap">
    <div id="links-container"></div>
    <div class="section-divider" id="form-divider"></div>
    <div class="form-section" id="form-section">
      <span class="form-label-top">Write to me</span>
      <form id="contact-form" action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <div class="form-field">
          <input type="text" name="name" placeholder="Your name" required autocomplete="off">
        </div>
        <div class="form-field">
          <input type="email" name="email" placeholder="Your email" required autocomplete="off">
        </div>
        <div class="form-field">
          <textarea name="message" placeholder="Message" required></textarea>
        </div>
        <button type="submit" class="form-submit">
          Send <span class="submit-arrow">→</span>
        </button>
        <div class="form-status" id="form-status"></div>
      </form>
    </div>
  </div>
</main>

<script>
document.addEventListener('contextmenu', e => e.preventDefault());

// ── Grain ──
const grain = document.getElementById('grain');
const gc = grain.getContext('2d');
let gw, gh;
function resizeGrain() {
  gw = grain.width  = window.innerWidth  + 20;
  gh = grain.height = window.innerHeight + 120;
}
resizeGrain(); window.addEventListener('resize', resizeGrain);
(function tick() {
  const img = gc.createImageData(gw, gh);
  for (let i = 0; i < img.data.length; i += 4) {
    const v = Math.random() * 255 | 0;
    img.data[i] = img.data[i+1] = img.data[i+2] = v;
    img.data[i+3] = Math.random() * 26 | 0;
  }
  gc.putImageData(img, 0, 0);
  requestAnimationFrame(tick);
})();

// ── Custom cursor ──
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});
document.addEventListener('mousedown', () => cursor.classList.add('pressed'));
document.addEventListener('mouseup',   () => cursor.classList.remove('pressed'));

// ── Scroll progress ──
const progressEl = document.getElementById('scroll-progress');
window.addEventListener('scroll', () => {
  const max = document.documentElement.scrollHeight - window.innerHeight;
  const pct = max > 0 ? (window.scrollY / max * 100).toFixed(1) : 0;
  progressEl.style.setProperty('--progress', pct + '%');
}, { passive: true });

// ── Header ──
const headerEl = document.getElementById('siteHeader');
setTimeout(() => headerEl.classList.add('visible'), 100);

// Hide/show on scroll with lerp smoothing
const HEADER_H = 72;
let lastScrollY   = window.scrollY;
let accumulated   = 0;
let targetOffset  = 0;
let currentOffset = 0;
let lerpRaf       = null;

function lerpHeader() {
  currentOffset += (targetOffset - currentOffset) * 0.12;
  if (Math.abs(targetOffset - currentOffset) < 0.2) {
    currentOffset = targetOffset; lerpRaf = null;
  } else {
    lerpRaf = requestAnimationFrame(lerpHeader);
  }
  headerEl.style.transform = `translateY(-${currentOffset.toFixed(2)}px)`;
  headerEl.style.pointerEvents = currentOffset >= HEADER_H ? 'none' : '';
}
function startLerp() { if (!lerpRaf) lerpRaf = requestAnimationFrame(lerpHeader); }

window.addEventListener('scroll', () => {
  const y  = window.scrollY;
  const dy = y - lastScrollY;
  lastScrollY = y;

  const navOpen = document.getElementById('navOverlay').classList.contains('open');
  if (navOpen) { targetOffset = 0; startLerp(); return; }
  if (y < 10)  { targetOffset = 0; accumulated = 0; startLerp(); return; }

  accumulated += dy;
  if (accumulated > 36)       { accumulated = 0; targetOffset = HEADER_H; }
  else if (accumulated < -28) { accumulated = 0; targetOffset = 0; }
  else if (dy !== 0 && Math.sign(dy) !== Math.sign(accumulated - dy)) { accumulated = dy; }
  startLerp();
}, { passive: true });

// ── Burger ──
(function(){
  const btn     = document.getElementById('swordBtn');
  const overlay = document.getElementById('navOverlay');
  btn.addEventListener('click', e => {
    e.stopPropagation();
    btn.classList.toggle('open');
    overlay.classList.toggle('open');
    if (navigator.vibrate) navigator.vibrate(6);
  });
  overlay.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', () => {
      btn.classList.remove('open'); overlay.classList.remove('open');
    });
  });
  document.addEventListener('click', e => {
    if (!overlay.contains(e.target) && e.target !== btn) {
      btn.classList.remove('open'); overlay.classList.remove('open');
    }
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { btn.classList.remove('open'); overlay.classList.remove('open'); }
  });
})();

// ── Data ──
const groups = [
  {
    label: 'Social', type: 'social',
    items: [
      { name: 'Instagram', url: 'https://instagram.com/noeasyvision',
        svg: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="0.8" fill="currentColor" stroke="none"/></svg>` },
      { name: 'Pinterest', url: 'https://pinterest.com/noeasyvision',
        svg: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.236 2.636 7.855 6.356 9.312-.088-.791-.167-2.005.035-2.868.181-.78 1.172-4.97 1.172-4.97s-.299-.598-.299-1.482c0-1.388.806-2.428 1.808-2.428.853 0 1.267.641 1.267 1.408 0 .858-.546 2.141-.828 3.329-.236.995.499 1.806 1.476 1.806 1.771 0 3.132-1.867 3.132-4.563 0-2.386-1.715-4.054-4.163-4.054-2.836 0-4.499 2.127-4.499 4.326 0 .856.33 1.775.741 2.276a.3.3 0 0 1 .069.285c-.075.314-.243.995-.276 1.134-.044.183-.146.222-.337.134-1.249-.581-2.03-2.407-2.03-3.874 0-3.154 2.292-6.052 6.608-6.052 3.469 0 6.165 2.473 6.165 5.776 0 3.447-2.173 6.22-5.19 6.22-1.013 0-1.966-.527-2.292-1.148l-.623 2.378c-.226.869-.835 1.958-1.244 2.621.937.29 1.931.446 2.962.446 5.523 0 10-4.477 10-10S17.523 2 12 2z"/></svg>` },
      { name: 'X', url: 'https://x.com/noeasyvision',
        svg: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>` },
      { name: 'Telegram', url: 'https://t.me/noeasyeye',
        svg: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8-1.69 7.97c-.12.55-.46.68-.93.42l-2.58-1.9-1.24 1.19c-.14.14-.25.25-.51.25l.18-2.6 4.73-4.27c.21-.18-.04-.28-.31-.1L7.36 14.4l-2.54-.8c-.55-.17-.56-.55.12-.82l9.91-3.82c.46-.17.86.11.79.84z"/></svg>` },
    ]
  },
  {
    label: 'Portfolio',
    items: [{ name: 'Behance', url: 'https://www.behance.net/noeasyvision' }]
  },
  {
    label: 'Prints',
    items: [{ name: 'INPRNT', url: 'https://www.inprnt.com/profile/noeasy' }]
  },
  {
    label: 'Digital Collectibles',
    items: [
      { name: 'Foundation', url: 'https://foundation.app/@noeasy' },
      { name: 'SuperRare',  url: 'https://superrare.com/noeasy' },
      { name: 'Objkt',      url: 'https://objkt.com/profile/noeasy' },
    ]
  },
  {
    label: 'Contact',
    items: [{ name: 'Email', url: 'mailto:noeasyart@gmail.com' }]
  },
];

function getDomain(url) {
  if (url.startsWith('mailto:')) return url.replace('mailto:', '');
  try { return new URL(url).hostname.replace('www.', ''); } catch { return ''; }
}

// ── Ambient color map ──
const ambientMap = {
  'instagram.com': [190, 100, 70],
  'pinterest.com': [150, 30, 30],
  'x.com':         [60, 60, 60],
  't.me':          [50, 120, 185],
  'behance.net':   [40, 70, 200],
  'inprnt.com':    [80, 110, 75],
  'foundation.app':[40, 40, 40],
  'superrare.com': [65, 45, 105],
  'objkt.com':     [30, 100, 130],
};
function blendBg(r, g, b, a) {
  const base = [246, 241, 218];
  const out = base.map((c, i) => Math.round(c * (1 - a) + [r,g,b][i] * a));
  document.body.style.backgroundColor = `rgb(${out[0]},${out[1]},${out[2]})`;
}

// ── Build DOM ──
const container = document.getElementById('links-container');

groups.forEach((group, gi) => {
  const section = document.createElement('div');
  section.className = 'section';

  const hdr = document.createElement('div');
  hdr.className = 'group-header';
  hdr.innerHTML = `<span class="group-label">${group.label}</span><span class="group-index">${String(gi + 1).padStart(2, '0')}</span>`;
  section.appendChild(hdr);

  if (group.type === 'social') {
    const row = document.createElement('div');
    row.className = 'social-row';
    group.items.forEach(s => {
      const a = document.createElement('a');
      a.className = 'social-pill';
      a.href = s.url; a.target = '_blank'; a.rel = 'noopener noreferrer';
      a.innerHTML = s.svg + `<span>${s.name}</span>`;

      const domain = getDomain(s.url);
      const color = Object.entries(ambientMap).find(([k]) => domain.includes(k))?.[1];
      if (color) {
        a.addEventListener('mouseenter', () => { blendBg(...color, 0.05); cursor.classList.add('active'); });
        a.addEventListener('mouseleave', () => { document.body.style.backgroundColor = ''; cursor.classList.remove('active'); });
      } else {
        a.addEventListener('mouseenter', () => cursor.classList.add('active'));
        a.addEventListener('mouseleave', () => cursor.classList.remove('active'));
      }
      row.appendChild(a);
    });
    section.appendChild(row);
  } else {
    group.items.forEach(link => {
      const row = document.createElement('div');
      row.className = 'link-row';

      const a = document.createElement('a');
      a.className = 'link-item';
      a.href = link.url;
      if (!link.url.startsWith('mailto')) { a.target = '_blank'; a.rel = 'noopener noreferrer'; }
      a.innerHTML = `<span class="link-name">${link.name}</span><span class="link-arrow">→</span>`;

      const domain = getDomain(link.url);
      const domainEl = document.createElement('span');
      domainEl.className = 'link-domain';
      domainEl.textContent = domain;

      const color = Object.entries(ambientMap).find(([k]) => domain.includes(k))?.[1];
      if (color) {
        row.addEventListener('mouseenter', () => { blendBg(...color, 0.05); cursor.classList.add('active'); });
        row.addEventListener('mouseleave', () => { document.body.style.backgroundColor = ''; cursor.classList.remove('active'); });
      } else {
        a.addEventListener('mouseenter', () => cursor.classList.add('active'));
        a.addEventListener('mouseleave', () => cursor.classList.remove('active'));
      }

      row.appendChild(a); row.appendChild(domainEl);
      section.appendChild(row);
    });
  }

  container.appendChild(section);
});

// ── Scroll reveal with stagger ──
const revealEls = [
  ...document.querySelectorAll('.section'),
  document.getElementById('form-divider'),
  document.getElementById('form-section'),
];
const revealObserver = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) { e.target.classList.add('visible'); revealObserver.unobserve(e.target); }
  });
}, { threshold: 0.06 });

revealEls.forEach((el, i) => {
  el.style.transitionDelay = (i * 0.07) + 's';
  revealObserver.observe(el);
});

// ── Contact form ──
const form   = document.getElementById('contact-form');
const status = document.getElementById('form-status');
form.addEventListener('submit', async e => {
  e.preventDefault();
  const btn = form.querySelector('.form-submit');
  btn.style.opacity = '0.15';
  try {
    const res = await fetch(form.action, {
      method: 'POST', body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    });
    status.textContent = res.ok ? 'Sent — talk soon' : 'Something went wrong';
    if (res.ok) form.reset();
  } catch { status.textContent = 'No connection'; }
  status.classList.add('show');
  btn.style.opacity = '';
});
</script>

</body>
</html>
