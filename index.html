<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NOEASY</title>
<link rel="icon" type="image/png" href="IMG_8091.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fondamento:ital@0;1&family=Space+Mono:wght@400;700&display=swap');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root { --bg:#f6f1da; --ink:#353535; }

html, body {
  width:100%; height:100%;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Space Mono', monospace;
  overflow: hidden;
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
}

#grain {
  position:fixed; inset:0; z-index:99; pointer-events:none;
}

/* ── Stage ── */
.stage {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
}

/* ── Logo ── */
.logo-wrap {
  position:relative; z-index:2;
  opacity:0;
  animation: appear 1.3s cubic-bezier(0.16,1,0.3,1) 0.1s forwards;
  will-change: transform;
}
.logo-wrap img {
  width: min(500px, 78vw);
  display:block;
  user-select:none; -webkit-user-drag:none; pointer-events:none;
  animation: float 6s ease-in-out 1.4s infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-8px); }
}
@keyframes appear {
  to { opacity:1; }
}

/* ── Nav pill ── */
.nav-wrap {
  position:relative; z-index:2;
  margin-top: 32px;
  opacity:0;
  animation: appear 0.8s ease 1.1s forwards;
  will-change: transform;
}

.nav-pill {
  display:flex; align-items:center;
  height: 42px;
  border-radius: 21px;
  backdrop-filter: blur(20px) saturate(1.3);
  -webkit-backdrop-filter: blur(20px) saturate(1.3);
  background: rgba(246,241,218,0.72);
  box-shadow: 0 1px 0 rgba(53,53,53,0.07),
              0 6px 28px rgba(53,53,53,0.07);
}

.pdiv {
  width:1px; height:18px;
  background:rgba(53,53,53,0.12);
  flex-shrink:0; align-self:center;
}

.plink {
  height:100%; display:flex; align-items:center;
  padding: 0 22px;
  font-family: 'Space Mono', monospace;
  font-size: 9px; font-weight:400;
  letter-spacing: 0.26em; text-transform:uppercase;
  color: var(--ink); text-decoration:none;
  opacity:0.38;
  transition: opacity 0.2s, background 0.18s, transform 0.12s cubic-bezier(0.34,1.56,0.64,1);
  border-radius: 0;
  user-select:none; white-space:nowrap;
  -webkit-tap-highlight-color: transparent;
}
.plink:first-child { border-radius: 21px 0 0 21px; }
.plink:last-child  { border-radius: 0 21px 21px 0; }
.plink:hover  { opacity:0.82; background:rgba(53,53,53,0.04); }
.plink:active { transform:scale(0.93); }
.plink.cur    { opacity:0.85; font-weight:700; pointer-events:none; }

/* ── Footer ── */
footer {
  position:fixed; bottom:0; left:0; right:0;
  z-index:10; pointer-events:none;
  padding: 0 32px calc(18px + env(safe-area-inset-bottom,0px));
  display:flex; align-items:flex-end; justify-content:space-between;
  opacity:0; animation: appear 0.7s ease 1.6s forwards;
}
footer a, footer span {
  font-size: 8px; letter-spacing:0.22em; text-transform:uppercase;
  color:var(--ink); text-decoration:none; opacity:0.2;
  pointer-events:auto;
  transition:opacity 0.22s;
}
footer a:hover { opacity:0.5; }
</style>
</head>

<script>
// ── Grain ──
const g = document.getElementById('grain');
const gc = g.getContext('2d');
let gw, gh;
function rsz() { gw = g.width = window.innerWidth; gh = g.height = window.innerHeight; }
rsz(); window.addEventListener('resize', rsz);
(function tick() {
  const d = gc.createImageData(gw, gh);
  for (let i = 0; i < d.data.length; i += 4) {
    const v = Math.random() * 255 | 0;
    d.data[i] = d.data[i+1] = d.data[i+2] = v;
    d.data[i+3] = Math.random() * 22 | 0;
  }
  gc.putImageData(d, 0, 0);
  requestAnimationFrame(tick);
})();

// ── Magnetic breathing ──
// Logo drifts softly toward cursor, nav drifts gently away
const logo = document.getElementById('logo');
const nav  = document.getElementById('nav');

let mx = window.innerWidth  / 2;
let my = window.innerHeight / 2;

let lx=0, ly=0; // logo current offset
let nx=0, ny=0; // nav current offset

const LOGO_PULL  = 0.018; // how much logo is drawn toward cursor
const NAV_PUSH   = 0.012; // how much nav is pushed from center
const LOGO_EASE  = 0.055;
const NAV_EASE   = 0.04;
const MAX_LOGO   = 14;
const MAX_NAV    = 22;

document.addEventListener('mousemove', e => {
  mx = e.clientX;
  my = e.clientY;
});

// Touch support — gentle
document.addEventListener('touchmove', e => {
  mx = e.touches[0].clientX;
  my = e.touches[0].clientY;
}, { passive: true });

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

(function animate() {
  const cx = window.innerWidth  / 2;
  const cy = window.innerHeight / 2;

  // Vector from center to mouse (normalized feel)
  const dx = mx - cx;
  const dy = my - cy;

  // Logo target: subtle drift TOWARD cursor
  const ltx = clamp(dx * LOGO_PULL, -MAX_LOGO, MAX_LOGO);
  const lty = clamp(dy * LOGO_PULL, -MAX_LOGO, MAX_LOGO);

  // Nav target: gentle drift AWAY from center (opposite direction, less)
  const ntx = clamp(-dx * NAV_PUSH, -MAX_NAV, MAX_NAV);
  const nty = clamp(-dy * NAV_PUSH, -MAX_NAV, MAX_NAV);

  // Smooth lerp
  lx += (ltx - lx) * LOGO_EASE;
  ly += (lty - ly) * LOGO_EASE;
  nx += (ntx - nx) * NAV_EASE;
  ny += (nty - ny) * NAV_EASE;

  logo.style.transform = `translate(${lx.toFixed(2)}px, ${ly.toFixed(2)}px)`;
  nav.style.transform  = `translate(${nx.toFixed(2)}px, ${ny.toFixed(2)}px)`;

  requestAnimationFrame(animate);
})();
</script>
