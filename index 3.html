<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gallery | NOEASY</title>
<link rel="icon" type="image/png" href="IMG_8091.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fondamento:ital@0;1&family=Space+Mono:wght@400;700&display=swap');
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  :root { --bg: #f6f1da; --text: #353535; }

  html, body {
    background: var(--bg);
    font-family: 'Space Mono', monospace;
    color: var(--text);
    overflow-x: hidden;
    overscroll-behavior: none;
  }
  html { background: var(--bg); }

  #grain {
    position: fixed;
    top: -60px; bottom: -60px; left: -10px; right: -10px;
    z-index: 10;
    pointer-events: none;
  }

  /* ── Header capsule ── */
  header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 500;
    padding: calc(14px + env(safe-area-inset-top, 0px)) 16px 0;
    display: flex; align-items: flex-start; justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.7s ease;
  }
  header.visible {
    opacity: 1;
  }
  header > * { pointer-events: auto; }

  /* Single full-width pill */
  .header-pill {
    display: flex; align-items: center;
    position: relative;
    width: 100%; max-width: min(820px, 92vw);
    height: 44px;
    border-radius: 22px;
    -webkit-backdrop-filter: blur(24px) saturate(1.3);
    backdrop-filter: blur(24px) saturate(1.3);
    background: rgba(246,241,218,0.74);
    box-shadow: 0 1px 0 rgba(53,53,53,0.07), 0 6px 28px rgba(53,53,53,0.06);
    overflow: visible;
  }

  .pill-divider {
    width: 1px; height: 20px; flex-shrink: 0;
    background: rgba(53,53,53,0.1);
    align-self: center;
  }

  /* Generic pill button */
  .pill-btn {
    height: 100%; display: flex; align-items: center;
    padding: 0 18px; gap: 7px;
    font-family: 'Space Mono', monospace;
    font-size: 10px; font-weight: 300;
    letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--text); background: none; border: none;
    cursor: pointer; opacity: 0.42; user-select: none;
    transition: opacity 0.22s, background 0.18s, transform 0.12s cubic-bezier(0.34,1.56,0.64,1);
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap; flex-shrink: 0;
  }
  .pill-btn:hover  { opacity: 0.76; }
  .pill-btn:active { transform: scale(0.93); background: rgba(53,53,53,0.06); }
  .pill-btn.open   { opacity: 0.88; }

  /* Active dot inside filter btn */
  .filter-dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--text); opacity: 0;
    transition: opacity 0.3s; flex-shrink: 0;
  }
  .filter-dot.visible { opacity: 0.55; }

  /* Count — grows to fill middle */
  .pill-center {
    position: absolute; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px; pointer-events: none; user-select: none;
    white-space: nowrap;
  }
  .pill-section {
    font-family: 'Fondamento', serif;
    font-size: 14px; letter-spacing: 0.08em;
    opacity: 0.7; white-space: nowrap;
  }
  .pill-count {
    font-size: 8px; font-weight: 300;
    letter-spacing: 0.22em; opacity: 0.22;
    white-space: nowrap;
  }

  /* ── Filter dropdown panel ── */
  .filter-panel {
    position: fixed;
    top: 68px;
    left: 50%; transform: translateX(-50%);
    z-index: 499;
    max-width: min(820px, 92vw);
    width: 92vw;
    border-radius: 18px;
    padding: 0 4px;
    background: rgba(246,241,218,0.88);
    -webkit-backdrop-filter: blur(20px) saturate(1.2);
    backdrop-filter: blur(20px) saturate(1.2);
    box-shadow: 0 2px 0 rgba(53,53,53,0.05), 0 12px 40px rgba(53,53,53,0.08);

    opacity: 0; pointer-events: none;
    transform: translateX(-50%) translateY(-6px) scale(0.98);
    transform-origin: top center;
    transition:
      opacity 0.3s cubic-bezier(0.16,1,0.3,1),
      transform 0.3s cubic-bezier(0.16,1,0.3,1);
  }
  .filter-panel.open {
    opacity: 1; pointer-events: auto;
    transform: translateX(-50%) translateY(0) scale(1);
  }

  /* ── Burger inside pill ── */
  .sword-btn {
    height: 100%; padding: 0 18px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 5.5px; background: none; border: none; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s;
    flex-shrink: 0;
  }
  .sword-btn:active { transform: scale(0.88); }

  .sword-btn .line {
    position: relative; height: 1.5px; background: var(--text);
    border-radius: 2px; opacity: 0.5;
    transition: transform 0.38s cubic-bezier(0.16,1,0.3,1),
                opacity 0.25s,
                width 0.38s cubic-bezier(0.16,1,0.3,1);
  }
  .sword-btn .line:nth-child(1) { width: 20px; }
  .sword-btn .line:nth-child(2) { width: 14px; }
  .sword-btn .line:nth-child(3) { width: 17px; }
  .sword-btn .line::after {
    content: ''; position: absolute; right: 3px; top: 50%;
    transform: translateY(-50%); width: 1.5px; height: 6px;
    background: var(--text); border-radius: 1px;
    opacity: 0.5; transition: opacity 0.25s;
  }
  .sword-btn.open .line { opacity: 0.75; }
  .sword-btn.open .line:nth-child(1) { width: 18px; transform: translateY(7px) rotate(45deg); }
  .sword-btn.open .line:nth-child(2) { opacity: 0; transform: scaleX(0); }
  .sword-btn.open .line:nth-child(3) { width: 18px; transform: translateY(-7px) rotate(-45deg); }
  /* Sword hilts appear when open */
  .sword-btn.open .line::after { opacity: 0.55; }

  /* Burger lines — consistent size on all screens */
  @media (min-width: 681px) {
    .sword-btn { gap: 5px; padding: 0 18px; }
    .sword-btn .line { height: 1.5px; opacity: 0.45; }
    .sword-btn .line:nth-child(1) { width: 18px; }
    .sword-btn .line:nth-child(2) { width: 13px; }
    .sword-btn .line:nth-child(3) { width: 16px; }
    .sword-btn .line::after { height: 6px; width: 1.5px; opacity: 0.45; }
    .sword-btn.open .line:nth-child(1) { width: 17px; transform: translateY(6.5px) rotate(45deg); }
    .sword-btn.open .line:nth-child(3) { width: 17px; transform: translateY(-6.5px) rotate(-45deg); }
    .sword-btn.open .line::after { opacity: 0.55; }
  }

  /* ── Burger wrap — anchor point for dropdown ── */
  .burger-wrap {
    position: relative;
    height: 100%;
    display: flex; align-items: center;
  }

  /* ── Nav overlay — anchored to burger-wrap ── */
  .nav-overlay {
    position: absolute;
    top: calc(100% + 10px);
    right: 0;
    z-index: 8999;
    min-width: 160px;
    border-radius: 18px;
    padding: 6px 8px 8px;
    background: rgba(246,241,218,0.95);
    -webkit-backdrop-filter: blur(22px) saturate(1.3);
    backdrop-filter: blur(22px) saturate(1.3);
    box-shadow: 0 2px 0 rgba(53,53,53,0.05), 0 12px 40px rgba(53,53,53,0.12);
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none;
    transform: translateY(-6px) scale(0.97);
    transform-origin: top right;
    transition:
      opacity 0.28s cubic-bezier(0.16,1,0.3,1),
      transform 0.28s cubic-bezier(0.16,1,0.3,1);
  }
  .nav-overlay.open {
    opacity: 1; pointer-events: auto;
    transform: translateY(0) scale(1);
  }
  .nav-overlay a {
    font-family: 'Space Mono', monospace;
    font-size: 10px; font-weight: 300;
    letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--text); text-decoration: none;
    padding: 10px 12px;
    opacity: 0.38; position: relative;
    transition: opacity 0.22s, background 0.18s;
    border-radius: 12px;
  }
  .nav-overlay a::after {
    content: '';
    position: absolute; bottom: 6px; left: 12px;
    width: 0; height: 1px;
    background: var(--text); opacity: 0.45;
    transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .nav-overlay a:hover { opacity: 0.75; background: rgba(53,53,53,0.04); }
  .nav-overlay a:hover::after { width: calc(100% - 24px); }
  .nav-overlay a.current { opacity: 0.88; font-weight: 500; }
  .nav-overlay a.current::after { width: calc(100% - 24px); }
  .nav-overlay a + a { border-top: 1px solid rgba(53,53,53,0.06); border-radius: 0 0 12px 12px; }
  .nav-overlay a:first-child { border-radius: 12px 12px 0 0; }

  /* Landscape: shorter images so top doesn't clip under header blur */
  @media (orientation: landscape) {
    .img-wrap img, .img-placeholder { max-height: 62vh; }
  }

  /* ── Feed ── */
  main {
    padding: calc(82px + env(safe-area-inset-top, 0px)) 0 140px;
    display: flex; flex-direction: column; align-items: center;
  }

  .work-item {
    width: min(820px, 88vw, 68vh);
    padding: 48px 0;
    display: flex; flex-direction: column; align-items: center;
    position: relative; z-index: 20;
  }

  /* Footer rises after image */
  .work-footer {
    width: 100%; margin-top: 13px;
    display: flex; justify-content: space-between; align-items: baseline;
    gap: 12px; position: relative; z-index: 20;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.16,1,0.3,1);
  }
  .work-item.visible .work-footer {
    opacity: 1; transform: none;
    transition-delay: 0.35s;
  }

  /* Image wrap — curtain reveal */
  .img-wrap {
    z-index: 15;
    width: 100%; overflow: hidden; cursor: zoom-in;
    position: relative; z-index: 20;
    clip-path: inset(0 0 100% 0);
    transition: clip-path 0.75s cubic-bezier(0.77, 0, 0.18, 1);
  }
  .work-item.visible .img-wrap {
    clip-path: inset(0 0 0% 0);
  }

  /* Inner image — JS owns transform for parallax; CSS handles blur only */
  .img-wrap img,
  .img-placeholder {
    width: 100%; display: block;
    max-height: 75vh; object-fit: cover;
    will-change: transform, filter;
    filter: blur(5px);
    transition: filter 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    user-select: none; -webkit-user-drag: none;
  }
  .work-item.visible .img-wrap img,
  .work-item.visible .img-wrap .img-placeholder {
    filter: blur(0px);
  }
  .img-placeholder { position: relative; }

  .work-left { display: flex; flex-direction: column; gap: 5px; }
  .work-title-row { display: flex; align-items: center; gap: 10px; }
  .work-title {
    font-family: 'Fondamento', serif;
    font-size: 20px; font-weight: 400;
    letter-spacing: 0.04em; opacity: 0.72;
  }
  .work-year {
    font-size: 9px; font-weight: 300;
    letter-spacing: 0.16em; opacity: 0.28;
    white-space: nowrap;
  }
  .work-tags { display: flex; align-items: center; gap: 0; flex-wrap: wrap; }
  .work-tag {
    font-size: 8px; font-weight: 300;
    letter-spacing: 0.22em; text-transform: uppercase; opacity: 0.28;
  }
  .work-tag-sep {
    font-size: 7px; opacity: 0.18;
    margin: 0 7px; line-height: 1;
    user-select: none;
  }

  /* Right side of footer */
  .work-right {
    display: flex; flex-direction: column;
    align-items: flex-end; gap: 6px; flex-shrink: 0;
  }

  /* ── Purchase pill button ── */
  .purchase-wrap { position: relative; }
  .purchase-btn {
    height: 30px;
    display: flex; align-items: center;
    padding: 0 14px; gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 8px; font-weight: 300;
    letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--text); background: rgba(246,241,218,0.7);
    border: none; border-radius: 15px; cursor: pointer;
    -webkit-backdrop-filter: blur(16px) saturate(1.2);
    backdrop-filter: blur(16px) saturate(1.2);
    box-shadow: 0 1px 0 rgba(53,53,53,0.07), 0 4px 16px rgba(53,53,53,0.07);
    opacity: 0.52;
    transition: opacity 0.22s, transform 0.12s cubic-bezier(0.34,1.56,0.64,1);
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap; user-select: none;
  }
  .purchase-btn:hover  { opacity: 0.82; }
  .purchase-btn:active { transform: scale(0.93); }
  .purchase-btn.open   { opacity: 0.9; }
  .purchase-btn .pb-arrow {
    font-size: 7px; opacity: 0.5;
    transition: transform 0.25s cubic-bezier(0.16,1,0.3,1);
    display: inline-block;
  }
  .purchase-btn.open .pb-arrow { transform: rotate(180deg); }

  /* Purchase dropdown */
  .purchase-dropdown {
    position: absolute;
    bottom: calc(100% + 8px);
    right: 0;
    min-width: 140px;
    border-radius: 14px;
    padding: 5px 6px 6px;
    background: rgba(246,241,218,0.95);
    -webkit-backdrop-filter: blur(22px) saturate(1.3);
    backdrop-filter: blur(22px) saturate(1.3);
    box-shadow: 0 2px 0 rgba(53,53,53,0.05), 0 10px 34px rgba(53,53,53,0.1);
    opacity: 0; pointer-events: none;
    transform: translateY(5px) scale(0.97);
    transform-origin: bottom right;
    transition: opacity 0.25s cubic-bezier(0.16,1,0.3,1),
                transform 0.25s cubic-bezier(0.16,1,0.3,1);
    z-index: 100;
  }
  .purchase-dropdown.open {
    opacity: 1; pointer-events: auto;
    transform: translateY(0) scale(1);
  }
  .purchase-dropdown a {
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 9px; font-weight: 300;
    letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--text); text-decoration: none;
    padding: 9px 10px;
    opacity: 0.4; border-radius: 10px;
    transition: opacity 0.2s, background 0.18s;
    white-space: nowrap;
  }
  .purchase-dropdown a + a { border-top: 1px solid rgba(53,53,53,0.06); border-radius: 0 0 10px 10px; }
  .purchase-dropdown a:first-child { border-radius: 10px 10px 0 0; }
  .purchase-dropdown a:hover { opacity: 0.8; background: rgba(53,53,53,0.04); }

  /* Thin separator between works */
  .sep {
    width: min(820px, 88vw, 68vh);
    height: 1px;
    background: var(--text); opacity: 0.07;
    position: relative; z-index: 20;
  }

  /* Empty state */
  #empty-state {
    display: none; padding: 100px 0;
    font-size: 10px; font-weight: 300;
    letter-spacing: 0.32em; text-transform: uppercase;
    opacity: 0.28; text-align: center;
  }

  /* Lightbox */
  #lightbox {
    position: fixed; inset: 0; z-index: 2000;
    background: rgba(14,12,10,0.94);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.45s ease;
    cursor: zoom-out;
  }
  #lightbox.open { opacity: 1; pointer-events: auto; }
  #lb-img {
    max-width: 92vw; max-height: 92vh;
    object-fit: contain; display: block;
    transform: scale(0.94) translateY(14px);
    transition: transform 0.56s cubic-bezier(0.16,1,0.3,1);
    user-select: none; -webkit-user-drag: none;
  }
  #lightbox.open #lb-img { transform: none; }
  #lb-close {
    position: absolute; top: 30px; right: 40px;
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: #f6f1da; opacity: 0.35; cursor: pointer;
    transition: opacity 0.3s; user-select: none;
  }
  #lb-close:hover { opacity: 0.8; }
  #lb-title {
    position: absolute; bottom: 34px; left: 50%;
    transform: translateX(-50%);
    font-size: 9px; font-weight: 300;
    letter-spacing: 0.28em; text-transform: uppercase;
    color: #f6f1da; opacity: 0.28; white-space: nowrap;
    pointer-events: none;
  }

  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes phPulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.7; }
  }

  /* ── Custom cursor ── */
  #cursor {
    position: fixed; z-index: 9999; pointer-events: none;
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid rgba(53,53,53,0.35);
    transform: translate(-50%, -50%) scale(0);
    transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1),
                opacity 0.2s, border-color 0.2s;
    opacity: 0;
    mix-blend-mode: multiply;
  }
  #cursor.active { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  #cursor.pressed { transform: translate(-50%, -50%) scale(0.6); }

  /* ── Scroll progress ── */
  #scroll-progress {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: 2px; z-index: 400; pointer-events: none;
  }
  #scroll-progress::after {
    content: '';
    position: absolute; left: 0; top: 0;
    width: 100%;
    height: var(--progress, 0%);
    background: var(--text);
    opacity: 0.15;
    transition: height 0.1s linear;
  }

  /* ── Placeholder pulse while loading ── */
  .img-placeholder.loading {
    animation: phPulse 2s ease-in-out infinite;
  }

  /* ── Card hover: footer brightens ── */
  .work-item:hover .work-title { opacity: 0.92; }
  .work-item:hover .work-tag   { opacity: 0.45; }
  .work-item:hover .work-year  { opacity: 0.45; }
  .work-item:hover .work-link  { opacity: 0.55; }

  /* ── View toggle button ── */
  .view-btn {
    height: 100%; padding: 0 20px;
    display: flex; align-items: center; justify-content: center;
    background: none; border: none; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.22s, transform 0.12s cubic-bezier(0.34,1.56,0.64,1);
    opacity: 0.55; flex-shrink: 0;
  }
  .view-btn:hover  { opacity: 0.85; }
  .view-btn:active { transform: scale(0.88); }

  /* Icon: one square — filled (feed) ↔ crossed (grid) */
  .view-btn-inner {
    position: relative;
    width: 13px; height: 13px;
    border: 1.5px solid rgba(53,53,53,0.55);
    border-radius: 2.5px;
    flex-shrink: 0;
  }
  /* Fill — visible in feed mode */
  .view-btn-inner::before {
    content: ''; position: absolute; inset: 0;
    background: var(--text); opacity: 0.55;
    transition: opacity 0.28s cubic-bezier(0.4,0,0.2,1);
  }
  /* Cross — visible in grid mode */
  .view-btn-inner::after {
    content: ''; position: absolute; inset: 0;
    background:
      linear-gradient(var(--text), var(--text)) center / 1.5px 100% no-repeat,
      linear-gradient(var(--text), var(--text)) center / 100% 1.5px no-repeat;
    opacity: 0;
    transition: opacity 0.28s cubic-bezier(0.4,0,0.2,1);
  }
  .view-btn.grid-active .view-btn-inner::before { opacity: 0; }
  .view-btn.grid-active .view-btn-inner::after  { opacity: 0.55; }
  /* ── Grid mode — explicit columns ── */
  main.grid-mode {
    flex-direction: row;
    align-items: flex-start;
    justify-content: center;
    gap: 12px;
    padding-left: 16px; padding-right: 16px;
  }
  main.grid-mode .sep { display: none; }

  .grid-col {
    flex: 1; max-width: 420px;
    display: flex; flex-direction: column;
    will-change: transform;
  }
  /* Second column drops down — creates the layered offset */
  .grid-col[data-col="1"] { margin-top: 160px; }
  /* Third column (desktop) at medium offset */
  .grid-col[data-col="2"] { margin-top: 80px; }

  main.grid-mode .work-item {
    width: 100%; padding: 10px 0 20px;
  }

  /* Hover: image lifts slightly */
  main.grid-mode .img-wrap {
    transition: transform 0.38s cubic-bezier(0.16,1,0.3,1);
    overflow: hidden;
  }
  main.grid-mode .work-item:hover .img-wrap {
    transform: scale(1.02) translateY(-3px);
  }

  @media (max-width: 600px) {
    main.grid-mode { gap: 8px; padding: 0 10px; }
    .grid-col[data-col="1"] { margin-top: 100px; }
  }

  /* ── Lightbox nav arrows ── */
  .lb-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    font-size: 10px; font-weight: 300; letter-spacing: 0.24em;
    text-transform: uppercase; color: #f6f1da;
    opacity: 0.3; cursor: pointer; user-select: none;
    transition: opacity 0.25s; padding: 20px;
    -webkit-tap-highlight-color: transparent;
  }
  .lb-arrow:hover { opacity: 0.75; }
  #lb-prev { left: 20px; }
  #lb-next { right: 20px; }
  .lb-arrow.hidden { opacity: 0 !important; pointer-events: none; }

  /* ── Mobile: horizontal scroll in filter groups ── */
  @media (max-width: 680px) {
    .filter-group {
      flex-wrap: nowrap; overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      gap: 0 16px;
    }
    .filter-group::-webkit-scrollbar { display: none; }
    .filter-group-label { min-width: 70px; }

    /* Pill: tighter padding on mobile */
    header { padding: 12px 10px 0; }
    .pill-btn { padding: 0 12px; font-size: 9px; letter-spacing: 0.20em; }
    .pill-count { font-size: 8px; letter-spacing: 0.18em; }
    .pill-section { font-size: 11px; }
    .sword-btn { padding: 0 14px; }
    .view-btn { padding: 0 14px; }
    .view-btn + .pill-divider, .view-btn { display: none; }

    /* Fix filter-dot spacing on mobile */
    #filter-toggle { gap: 0; }
    .filter-dot { max-width: 0; overflow: hidden; margin: 0; }
    .filter-dot.visible { max-width: 4px; margin-left: 5px; }
  }

  /* ── Filter groups inside pill panel ── */
  .filter-panel {
    flex-direction: column;
    gap: 0;
    padding: 6px 8px 8px;
  }
  .filter-group {
    display: flex; flex-wrap: wrap; align-items: center;
    gap: 0 20px; padding: 10px 12px;
  }
  .filter-group + .filter-group {
    border-top: 1px solid rgba(53,53,53,0.06);
  }
  .filter-group-label {
    font-size: 8px; font-weight: 500;
    letter-spacing: 0.32em; text-transform: uppercase;
    opacity: 0.28; min-width: 90px; flex-shrink: 0;
  }

  .tag-btn {
    font-size: 10px; font-weight: 300;
    letter-spacing: 0.26em; text-transform: uppercase;
    color: var(--text); background: none; border: none;
    cursor: pointer; padding: 5px 0;
    position: relative; opacity: 0.32;
    transition: opacity 0.25s; user-select: none;
    white-space: nowrap;
  }
  .tag-btn::after {
    content: '';
    position: absolute; bottom: 2px; left: 0;
    width: 0; height: 1px;
    background: var(--text); opacity: 0.55;
    transition: width 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  .tag-btn.active { opacity: 0.88; font-weight: 500; }
  .tag-btn.active::after { width: 100%; }
  .tag-btn:hover:not(.active) { opacity: 0.55; }

  /* Availability group hidden when Commission active */
  .filter-group.avail-hidden {
    opacity: 0.28; pointer-events: none;
  }
  .filter-group.avail-hidden .tag-btn { cursor: default; }

  @media (max-width: 680px) {
    header { padding: 12px 12px 0; }
    .filter-panel { top: 66px; width: 88vw; }
    #lb-close { top: 18px; right: 18px; }
    main { padding: 80px 0 140px; }
  }

  @media(max-width:600px) { /* mobile reserved */ }

  </style>
</head>

<script>
document.addEventListener('contextmenu', e => e.preventDefault());

// ── Custom cursor ──
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});
function setCursorActive(on) { cursor.classList.toggle('active', on); }
document.addEventListener('mousedown', () => cursor.classList.add('pressed'));
document.addEventListener('mouseup',   () => cursor.classList.remove('pressed'));

// ── Scroll progress ──
const progressEl = document.getElementById('scroll-progress');
window.addEventListener('scroll', () => {
  const max = document.documentElement.scrollHeight - window.innerHeight;
  const pct = max > 0 ? (window.scrollY / max * 100).toFixed(1) : 0;
  progressEl.style.setProperty('--progress', pct + '%');
}, { passive: true });

// ── Grain ──
const grain = document.getElementById('grain');
const gc = grain.getContext('2d');
let gw, gh;
function resizeGrain() {
  gw = grain.width  = window.innerWidth  + 20;
  gh = grain.height = window.innerHeight + 120;
}
resizeGrain(); window.addEventListener('resize', resizeGrain);
(function tick() {
  const img = gc.createImageData(gw, gh);
  for (let i = 0; i < img.data.length; i += 4) {
    const v = Math.random() * 255 | 0;
    img.data[i] = img.data[i+1] = img.data[i+2] = v;
    img.data[i+3] = Math.random() * 26 | 0;
  }
  gc.putImageData(img, 0, 0);
  requestAnimationFrame(tick);
})();

// ── DATA ──
let works = [];

async function loadWorks() {
  try {
    const r = await fetch('works.json');
    if (!r.ok) throw new Error('not found');
    works = await r.json();
  } catch(e) {
    // Fallback: empty gallery
    works = [];
  }
  render();
}

// ── State ──
let sortAsc     = false;
let activeStyle = 'all';
let activeType  = 'all';
let activeAvail = new Set(['all']);
let savedAvail  = new Set(['all']);
let isGrid      = false;
let lbIndex     = -1;
let currentList = [];

function fmtDate(dateStr, yearFallback) {
  if (dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    if (!isNaN(d)) return d.toLocaleString('en-US', { month: 'long', year: 'numeric' });
  }
  return yearFallback || '';
}

function getSorted() {
  return [...works].sort((a, b) => {
    const da = a.date || String(a.year || 0);
    const db = b.date || String(b.year || 0);
    return sortAsc ? da.localeCompare(db) : db.localeCompare(da);
  });
}
function getFiltered() {
  return getSorted().filter(w => {
    const styleOk = activeStyle === 'all' || w.style === activeStyle;
    const typeOk  = activeType  === 'all' || w.workType === activeType;
    const availOk = activeType === 'Commission'
      || activeAvail.has('all')
      || w.avail.some(a => activeAvail.has(a));
    return styleOk && typeOk && availOk;
  });
}

// ── Counter animation ──
const wcEl  = document.getElementById('work-count');
function animateCount(text) {
  if (wcEl.textContent === text) return;
  wcEl.style.cssText = 'opacity:0;transform:translateY(-6px) scale(0.9);transition:none';
  requestAnimationFrame(() => {
    wcEl.textContent = text;
    requestAnimationFrame(() => {
      wcEl.style.cssText = 'opacity:0.26;transform:none;transition:opacity 0.4s cubic-bezier(0.16,1,0.3,1),transform 0.4s cubic-bezier(0.16,1,0.3,1)';
    });
  });
}

// ── Haptic feedback ──
function haptic(style = 'light') {
  if (window.navigator && window.navigator.vibrate) {
    const pat = style === 'light' ? 6 : style === 'medium' ? 12 : [8, 40, 8];
    window.navigator.vibrate(pat);
  }
}

// ── Render ──
const feed  = document.getElementById('feed');
const empty = document.getElementById('empty-state');
let observer;

function render(scrollTop = false) {
  if (observer) observer.disconnect();
  feed.innerHTML = '';
  currentList = getFiltered();
  animateCount(currentList.length + (currentList.length === 1 ? ' work' : ' works'));
  feed.classList.toggle('grid-mode', isGrid);

  if (scrollTop && window.scrollY > 0) {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  if (!currentList.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';

  // Grid mode: distribute into explicit column wrappers
  const numCols = isGrid ? (window.innerWidth >= 1100 ? 3 : 2) : 1;
  let colEls = [];
  if (isGrid) {
    for (let c = 0; c < numCols; c++) {
      const col = document.createElement('div');
      col.className = 'grid-col';
      col.dataset.col = c;
      feed.appendChild(col);
      colEls.push(col);
    }
  }

  currentList.forEach((work, i) => {
    const item = document.createElement('div');
    item.className = 'work-item';
    // tag with column index for parallax
    if (isGrid) item.dataset.col = i % numCols;

    const wrap = document.createElement('div');
    wrap.className = 'img-wrap';

    if (work.src) {
      const img = document.createElement('img');
      img.src = work.src; img.alt = work.title; img.loading = 'lazy';
      wrap.appendChild(img);
      wrap.addEventListener('click', () => { lbIndex = i; openLb(); });
      wrap.addEventListener('mouseenter', () => setCursorActive(true));
      wrap.addEventListener('mouseleave', () => setCursorActive(false));
    } else {
      const ph = document.createElement('div');
      ph.className = 'img-placeholder loading';
      ph.style.background = work.ph.color;
      ph.style.paddingTop = work.ph.ratio;
      setTimeout(() => ph.classList.remove('loading'), 2500);
      wrap.appendChild(ph);
      wrap.style.cursor = 'default';
    }

    const footer = document.createElement('div');
    footer.className = 'work-footer';

    const tagParts = [work.style, work.workType];
    if (work.workType === 'Personal' && work.avail.length) tagParts.push(...work.avail);
    const tagsHtml = tagParts.map(t => `<span class="work-tag">${t}</span>`)
      .join('<span class="work-tag-sep">×</span>');

    const left = document.createElement('div');
    left.className = 'work-left';

    const titleRow = document.createElement('div');
    titleRow.className = 'work-title-row';
    titleRow.innerHTML = `<span class="work-title">${work.title}</span><span class="work-year">${fmtDate(work.date, work.year)}</span>`;
    left.appendChild(titleRow);

    const tagsEl = document.createElement('div');
    tagsEl.className = 'work-tags';
    tagsEl.innerHTML = tagsHtml;
    left.appendChild(tagsEl);

    const right = document.createElement('div');
    right.className = 'work-right';

    if (work.links && work.links.length) {
      const wrap = document.createElement('div');
      wrap.className = 'purchase-wrap';

      const btn = document.createElement('button');
      btn.className = 'purchase-btn';
      btn.innerHTML = `Purchase <span class="pb-arrow">▾</span>`;

      const dropdown = document.createElement('div');
      dropdown.className = 'purchase-dropdown';
      work.links.forEach(lk => {
        const a = document.createElement('a');
        a.href = lk.url; a.textContent = lk.label;
        a.target = '_blank'; a.rel = 'noopener';
        a.addEventListener('click', e => { e.stopPropagation(); dropdown.classList.remove('open'); btn.classList.remove('open'); });
        dropdown.appendChild(a);
      });

      btn.addEventListener('click', e => {
        e.stopPropagation();
        const open = dropdown.classList.toggle('open');
        btn.classList.toggle('open', open);
        haptic('light');
      });
      document.addEventListener('click', () => { dropdown.classList.remove('open'); btn.classList.remove('open'); });

      wrap.appendChild(btn); wrap.appendChild(dropdown);
      right.appendChild(wrap);
    }

    footer.appendChild(left); footer.appendChild(right);
    item.appendChild(wrap); item.appendChild(footer);

    if (isGrid) {
      // stagger reveal by column — col 1 slightly later
      const colIdx = i % numCols;
      item.style.transitionDelay = `${colIdx * 0.06}s`;
      colEls[colIdx].appendChild(item);
    } else {
      feed.appendChild(item);
    }

    if (!isGrid && i < currentList.length - 1) {
      const sep = document.createElement('div');
      sep.className = 'sep'; feed.appendChild(sep);
    }
  });

  // Scroll reveal + ambient
  const items = feed.querySelectorAll('.work-item');
  observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add('visible');
        observer.unobserve(e.target);
        updateAmbient(e.target);
      }
    });
  }, { threshold: 0.01, rootMargin: '0px 0px 60px 0px' });
  items.forEach(el => observer.observe(el));
  initParallax();
}

// ── Ambient background color ──
function blendWithBg(hex, amount) {
  const m = hex.match(/\d+/g);
  if (!m || m.length < 3) return;
  const [r, g, b] = m.map(Number);
  const base = [246, 241, 218];
  const out = base.map((c, i) => Math.round(c * (1 - amount) + [r,g,b][i] * amount));
  return `rgb(${out[0]},${out[1]},${out[2]})`;
}
let ambientTimer;
function updateAmbient(item) {
  const ph  = item.querySelector('.img-placeholder');
  const img = item.querySelector('img');
  let color = null;
  if (ph) {
    color = ph.style.background;
  } else if (img && img.complete) {
    try {
      const c = document.createElement('canvas'); c.width = c.height = 1;
      const ctx = c.getContext('2d'); ctx.drawImage(img, 0, 0, 1, 1);
      const [r,g,b] = ctx.getImageData(0,0,1,1).data;
      color = `${r},${g},${b}`;
    } catch(_) {}
  }
  if (!color) return;
  clearTimeout(ambientTimer);
  ambientTimer = setTimeout(() => {
    const blended = blendWithBg(color, 0.055);
    if (blended) {
      document.body.style.transition = 'background-color 3s ease';
      document.body.style.backgroundColor = blended;
    }
  }, 400);
}

// ── Parallax + reveal rise ──
// Per-column scroll speed factors for grid mode (col0=slowest, col1=fastest, col2=mid)
const COL_FACTORS = [0.07, 0.15, 0.10];
const FEED_FACTOR = 0.11;
let rafId = null;
const revealStart = new WeakMap();

function initParallax() {
  if (rafId) cancelAnimationFrame(rafId);
  const DURATION = 900;
  const OFFSET = 32;
  function tick() {
    const vh = window.innerHeight;
    const now = performance.now();
    feed.querySelectorAll('.work-item').forEach(item => {
      const wrap = item.querySelector('.img-wrap');
      const inner = wrap && wrap.firstElementChild;
      if (!inner) return;
      const rect = wrap.getBoundingClientRect();
      const colIdx = parseInt(item.dataset.col ?? '-1');
      const factor = isGrid && colIdx >= 0 ? COL_FACTORS[colIdx] ?? COL_FACTORS[0] : FEED_FACTOR;
      const parallax = ((rect.top + rect.height / 2) - vh / 2) * factor;
      if (!item.classList.contains('visible')) {
        inner.style.transform = `translateY(${OFFSET}px) scale(1.06)`;
        revealStart.delete(item);
        return;
      }
      if (!revealStart.has(item)) revealStart.set(item, now);
      const t = Math.min((now - revealStart.get(item)) / DURATION, 1);
      const ease = 1 - Math.pow(1 - t, 3);
      const rise = OFFSET * (1 - ease);
      const scale = 1.06 - 0.06 * ease;
      inner.style.transform = `translateY(${rise + parallax}px) scale(${scale})`;
    });
    rafId = requestAnimationFrame(tick);
  }
  rafId = requestAnimationFrame(tick);
}

// ── Grid toggle ──
const gridBtn = document.getElementById('grid-btn');
gridBtn.addEventListener('click', () => {
  isGrid = !isGrid;
  gridBtn.classList.toggle('grid-active', isGrid);
  gridBtn.title = isGrid ? 'Switch to feed' : 'Switch to grid';
  haptic('light'); render();
});

// ── Filter panel ──
const filterPanel  = document.getElementById('filter-panel');
const filterToggle = document.getElementById('filter-toggle');
const filterDot    = document.getElementById('filter-dot');
const availGroup   = document.getElementById('avail-group');

filterToggle.addEventListener('click', e => {
  e.stopPropagation();
  const open = filterPanel.classList.toggle('open');
  filterToggle.classList.toggle('open', open);
  haptic('light');
});
document.addEventListener('click', e => {
  if (!filterPanel.contains(e.target) && e.target !== filterToggle) {
    filterPanel.classList.remove('open');
    filterToggle.classList.remove('open');
  }
});

function updateFilterDot() {
  filterDot.classList.toggle('visible',
    activeStyle !== 'all' || activeType !== 'all' || !activeAvail.has('all'));
}
function updateAvailGroup() {
  availGroup.classList.toggle('avail-hidden', activeType === 'Commission');
}

filterPanel.addEventListener('click', e => {
  const btn = e.target.closest('.tag-btn');
  if (!btn) return;

  if (btn.classList.contains('style-btn')) {
    activeStyle = btn.dataset.tag;
    filterPanel.querySelectorAll('.style-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.tag === activeStyle));
  }
  if (btn.classList.contains('type-btn')) {
    const prev = activeType; activeType = btn.dataset.tag;
    if (activeType === 'Commission' && prev !== 'Commission') {
      savedAvail = new Set(activeAvail);
    } else if (activeType !== 'Commission' && prev === 'Commission') {
      activeAvail = new Set(savedAvail);
      filterPanel.querySelectorAll('.avail-btn').forEach(b =>
        b.classList.toggle('active',
          activeAvail.has(b.dataset.tag) || (activeAvail.has('all') && b.dataset.tag === 'all')));
    }
    filterPanel.querySelectorAll('.type-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.tag === activeType));
    updateAvailGroup();
  }
  if (btn.classList.contains('avail-btn') && activeType !== 'Commission') {
    const tag = btn.dataset.tag;
    if (tag === 'all') { activeAvail = new Set(['all']); }
    else {
      activeAvail.delete('all');
      activeAvail.has(tag) ? activeAvail.delete(tag) : activeAvail.add(tag);
      if (!activeAvail.size) activeAvail.add('all');
    }
    filterPanel.querySelectorAll('.avail-btn').forEach(b =>
      b.classList.toggle('active',
        activeAvail.has(b.dataset.tag) || (activeAvail.has('all') && b.dataset.tag === 'all')));
  }
  updateFilterDot(); haptic('light'); render(true);
});

// ── Sort ──
document.getElementById('sort-btn').addEventListener('click', function() {
  sortAsc = !sortAsc;
  this.textContent = sortAsc ? 'Oldest ↑' : 'Newest ↓';
  haptic('light'); render(true);
});

// ── Lightbox ──
const lb      = document.getElementById('lightbox');
const lbImg   = document.getElementById('lb-img');
const lbTitle = document.getElementById('lb-title');
const lbPrev  = document.getElementById('lb-prev');
const lbNext  = document.getElementById('lb-next');

function openLb(idx) {
  if (idx !== undefined) lbIndex = idx;
  const work = currentList[lbIndex];
  if (!work || !work.src) return;
  lbImg.style.opacity = '0';
  lbImg.src = work.src; lbImg.alt = work.title;
  lbTitle.textContent = work.title;
  lbImg.onload = () => { lbImg.style.opacity = '1'; };
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
  // Show/hide arrows — only for works that have images
  const hasPrev = currentList.slice(0, lbIndex).some(w => w.src);
  const hasNext = currentList.slice(lbIndex + 1).some(w => w.src);
  lbPrev.classList.toggle('hidden', !hasPrev);
  lbNext.classList.toggle('hidden', !hasNext);
}

function lbStep(dir) {
  let idx = lbIndex + dir;
  while (idx >= 0 && idx < currentList.length) {
    if (currentList[idx].src) { lbIndex = idx; openLb(); return; }
    idx += dir;
  }
}

function closeLb() {
  lb.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(() => { lbImg.src = ''; lbTitle.textContent = ''; }, 420);
}

lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
document.getElementById('lb-close').addEventListener('click', closeLb);
lbPrev.addEventListener('click', e => { e.stopPropagation(); lbStep(-1); });
lbNext.addEventListener('click', e => { e.stopPropagation(); lbStep(1); });
document.addEventListener('keydown', e => {
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape')     closeLb();
  if (e.key === 'ArrowLeft')  lbStep(-1);
  if (e.key === 'ArrowRight') lbStep(1);
});

// ── Lightbox swipe ──
let lbTouchX = null;
lb.addEventListener('touchstart', e => {
  lbTouchX = e.touches[0].clientX;
}, { passive: true });
lb.addEventListener('touchend', e => {
  if (lbTouchX === null) return;
  const dx = e.changedTouches[0].clientX - lbTouchX;
  lbTouchX = null;
  if (Math.abs(dx) < 40) return; // too short — ignore
  haptic('light');
  lbStep(dx < 0 ? 1 : -1);
}, { passive: true });

// ── Header hide on scroll ──
const headerEl = document.querySelector('header');
setTimeout(() => headerEl.classList.add('visible'), 100);

const HEADER_H = 72;
let lastScrollY   = window.scrollY;
let accumulated   = 0;
let targetOffset  = 0;
let currentOffset = 0;
let lerpRaf       = null;

function lerpHeader() {
  currentOffset += (targetOffset - currentOffset) * 0.12;
  if (Math.abs(targetOffset - currentOffset) < 0.2) {
    currentOffset = targetOffset;
    lerpRaf = null;
  } else {
    lerpRaf = requestAnimationFrame(lerpHeader);
  }
  headerEl.style.transform = `translateY(-${currentOffset.toFixed(2)}px)`;
  headerEl.style.pointerEvents = currentOffset >= HEADER_H ? 'none' : '';
}

function startLerp() {
  if (!lerpRaf) lerpRaf = requestAnimationFrame(lerpHeader);
}

window.addEventListener('scroll', () => {
  const y  = window.scrollY;
  const dy = y - lastScrollY;
  lastScrollY = y;

  const menuOpen = filterPanel.classList.contains('open') ||
                   document.getElementById('navOverlay').classList.contains('open');
  if (menuOpen) { targetOffset = 0; startLerp(); return; }

  if (y < 10) { targetOffset = 0; accumulated = 0; startLerp(); return; }

  accumulated += dy;

  if (accumulated > 36) {
    accumulated = 0;
    targetOffset = HEADER_H;
  } else if (accumulated < -28) {
    accumulated = 0;
    targetOffset = 0;
  } else if (dy !== 0 && Math.sign(dy) !== Math.sign(accumulated - dy)) {
    accumulated = dy;
  }

  startLerp();
}, { passive: true });

// Reveal header when filter opens
filterPanel.addEventListener('transitionend', () => {
  if (filterPanel.classList.contains('open')) {
    targetOffset = 0; accumulated = 0; startLerp();
  }
});

loadWorks();
</script>
</body>
</html>
